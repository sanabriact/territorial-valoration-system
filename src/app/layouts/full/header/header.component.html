<mat-toolbar class="h-[90px] px-8 bg-white border-b border-slate-200 flex items-center justify-between shadow-none">

    <!-- LEFT -->
    <div class="flex items-center gap-5">

        <!-- MOBILE BUTTON -->
        @if(!showToggle) {
        <button mat-icon-button (click)="toggleMobileNav.emit()" class="flex items-center justify-center">

            <i class="iconify text-[24px] text-slate-700" data-icon="solar:hamburger-menu-linear">
            </i>

        </button>
        }

        <!-- TITLES -->
        <div class="flex flex-col">

            <h1 class="m-0 text-[40px] font-bold text-slate-900 leading-[42px] tracking-[-1px]">

                {{ title }}

            </h1>

            <span class="mt-1 text-[15px] text-slate-500 font-medium">

                {{ subtitle }}

            </span>

        </div>

    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-5">

        <!-- GUIDE BUTTON -->
        @if(showGuideButton) {

        <button
            class="hidden sm:flex items-center gap-2 h-[48px] px-5 rounded-2xl border border-slate-200 bg-white hover:bg-slate-50 transition-all duration-200">

            <i class="iconify text-[18px] text-slate-700" data-icon="solar:question-circle-linear">
            </i>

            <span class="text-[14px] font-semibold text-slate-700">
                Guía de uso
            </span>

        </button>

        }

        <!-- NOTIFICATIONS -->
        <button
            class="relative w-[46px] h-[46px] rounded-2xl flex items-center justify-center hover:bg-slate-100 transition-all duration-200">

            <!-- ICON -->
            <iconify-icon icon="solar:bell-linear" class="text-[24px] text-slate-700">
            </iconify-icon>


            <!-- RED DOT -->
            <div
                class="absolute top-[10px] right-[10px] w-[10px] h-[10px] rounded-full bg-red-500 border-2 border-white">
            </div>

        </button>

        <!-- DIVIDER -->
        <div class="w-px h-10 bg-slate-200"></div>

        <!-- USER -->
        <div
            class="flex items-center gap-3 cursor-pointer hover:bg-slate-50 px-3 py-2 rounded-2xl transition-all duration-200">

            <!-- AVATAR -->
            <div
                class="w-[48px] h-[48px] rounded-full bg-blue-700 flex items-center justify-center text-white font-semibold text-[16px] uppercase shadow-sm">

                {{ user?.name?.charAt(0) }}

            </div>

            <!-- USER INFO -->
            <div class="hidden sm:flex flex-col leading-tight">

                <!-- NAME -->
                <span class="text-[15px] font-semibold text-slate-900">

                    {{ user?.name }}

                </span>

                <!-- ROLE -->
                <span class="text-[13px] text-slate-500 font-medium">

                    {{ user?.role }}

                </span>

            </div>

            <!-- ARROW -->
            <i class="iconify text-slate-400 text-[18px]" data-icon="solar:alt-arrow-down-linear">
            </i>

        </div>

    </div>

</mat-toolbar>
