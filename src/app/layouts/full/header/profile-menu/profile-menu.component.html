<button
    type="button"
    [matMenuTriggerFor]="profileMenu"
    class="flex items-center gap-3 cursor-pointer hover:bg-slate-50 px-3 py-2 rounded-2xl transition-all duration-200 border-0 bg-transparent">

    <div
        class="w-[48px] h-[48px] rounded-full bg-blue-700 flex items-center justify-center text-white font-semibold text-[16px] uppercase shadow-sm overflow-hidden">

        @if(user?.photo) {

            <img
                [src]="user?.photo"
                [alt]="displayName"
                class="w-full h-full object-cover"
                referrerpolicy="no-referrer"
                (error)="useFallbackImage($event)">

        } @else {

            {{ avatarFallback }}

        }

    </div>

    <div class="hidden sm:flex flex-col leading-tight text-left">

        <span class="text-[15px] font-semibold text-slate-900">
            {{ displayName }}
        </span>

        <span class="text-[13px] text-slate-500 font-medium">
            {{ user?.role }}
        </span>

    </div>

    <i class="iconify text-slate-400 text-[18px]" data-icon="solar:alt-arrow-down-linear">
    </i>

</button>

<mat-menu #profileMenu="matMenu">
    <button mat-menu-item type="button" (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Cerrar sesion</span>
    </button>
</mat-menu>
