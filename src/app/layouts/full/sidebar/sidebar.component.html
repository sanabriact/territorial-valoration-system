<div class="h-full bg-white border-r border-slate-200 flex flex-col">

    <!-- LOGO -->
    <div class="flex items-center gap-4 px-7 py-8 border-b border-slate-100">

        <!-- LOGO -->
        <div class="w-14 h-14 shrink-0">
            <img src="pinpoint.jpg" alt="Logo" class="w-full h-full object-contain">
        </div>

        <!-- TEXT -->
        <div class="flex flex-col">

            <span class="text-[24px] font-bold text-slate-900 leading-[24px]">
                Valoración
            </span>

            <span class="text-[24px] font-bold text-slate-900 leading-[24px]">
                Territorial
            </span>

        </div>

    </div>

    <!-- MENU -->
    <div class="flex-1 overflow-y-auto px-3 py-6">

        @for(section of sections; track section.title) {

        <div class="mb-8">

            <!-- SECTION TITLE -->
            @if(section.title) {

            <span class="block px-4 mb-3 text-[12px] font-bold uppercase tracking-[1px] text-slate-400">

                {{ section.title }}

            </span>

            }

            <!-- ITEMS -->
            <div class="flex flex-col gap-1">

                @for(item of section.items; track item.label) {

                <div>

                    <!-- MAIN ITEM -->
                    <a [routerLink]="item.route" routerLinkActive="sidebar-active" class="sidebar-item">

                        <!-- ICON -->
                        <iconify-icon [icon]="item.icon" class="sidebar-icon">
                        </iconify-icon>

                        <!-- LABEL -->
                        <span class="sidebar-label">

                            {{ item.label }}

                        </span>

                    </a>

                    <!-- SUBMENU -->
                    @if(item.children?.length) {

                    <div class="ml-12 mt-2 flex flex-col gap-2">

                        @for(child of item.children; track child.label) {

                        <a [routerLink]="child.route" routerLinkActive="text-blue-700"
                            class="text-[14px] font-medium text-slate-500 hover:text-blue-700 transition-all duration-200 no-underline">

                            {{ child.label }}

                        </a>

                        }

                    </div>

                    }

                </div>

                }

            </div>

        </div>

        }
    </div>
</div>
