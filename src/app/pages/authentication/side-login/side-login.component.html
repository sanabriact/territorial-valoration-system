<div class="login-container">

  <mat-card class="login-card">

    <div class="login-header">

      <h1>Iniciar sesión</h1>

      <p>
        Accede a la plataforma
      </p>

    </div>

    <div class="login-buttons">

      <button
        class="login-button"
        (click)="loginGoogle()"
        [disabled]="loading">

        <img
          src="login/google-icon-logo-svgrepo-com.svg"
          width="20"
          alt="Google">

        <span>
          Continuar con Google
        </span>

      </button>

      <button
        class="login-button"
        (click)="loginGithub()"
        [disabled]="loading">

        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="currentColor">

          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.37.6.1.82-.26.82-.58v-2.03c-3.34.72-4.04-1.6-4.04-1.6-.54-1.38-1.33-1.74-1.33-1.74-1.08-.74.08-.73.08-.73 1.2.08 1.83 1.23 1.83 1.23 1.06 1.82 2.79 1.29 3.47.99.1-.77.42-1.29.76-1.59-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.82.57C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z" />
        </svg>

        <span>
          Continuar con GitHub
        </span>

      </button>

    </div>

    @if (loading) {

      <div class="loading-box">

        <p>
          Autenticando...
        </p>

      </div>

    }

  </mat-card>

</div>
