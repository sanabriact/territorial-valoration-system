<section class="categories-page">
  <app-generic-table
    [columns]="columns"
    [data]="tableData()"
    [loading]="loading()"
    [treeConfig]="treeConfig"
    [showFilters]="false"
    cardTitle="Estructura de categorías"
    cardSubtitle="Consulta, crea, edita o elimina categorías y subcategorías."
    searchPlaceholder="Buscar categoría..."
    emptyMessage="No se encontraron categorías."
    (actionClicked)="onActionClicked($event)"
  />
</section>
