<div class="w-full h-full flex items-center justify-center">

    <div class="bg-white rounded-2xl border border-slate-200 px-10 py-12 shadow-sm">

        <h1 class="text-4xl font-semibold text-slate-900 m-0">
            Bienvenido,
            <span class="text-blue-700">
                {{ user()?.name || user()?.email || 'Usuario' }}
            </span>
        </h1>

        <p class="text-slate-500 mt-3 text-center">
            Nos alegra verte nuevamente en el sistema de valoracion territorial.
        </p>

        <div class="mt-8 flex flex-col items-center gap-3">

            <span class="text-[13px] font-semibold uppercase text-slate-400">
                Cambiar rol
            </span>

            <mat-button-toggle-group
                [value]="user()?.role"
                aria-label="Cambiar rol de sesion">

                @for(role of roles; track role) {

                    <mat-button-toggle
                        [value]="role"
                        (click)="changeRole(role)">
                        {{ role }}
                    </mat-button-toggle>

                }

            </mat-button-toggle-group>

        </div>

    </div>

</div>
